<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>To-Do Webapp</title>
  </head>
  <body>
    <main>
      <div class="app-container">
        <header>
          <nav class="nav-container">
            <h1 class="project-title">To-Do List</h1>

            <h3 class="subtitle">Organize our tasks and get things done.</h3>
          </nav>
        </header>

        <!-- add-task section -->
        <section class="add-task-section">
          <input
            type="text"
            id="taskInput"
            placeholder="What do you want to do?"
          />

          <button id="addTaskBtn">Add Task</button>
        </section>

        <!-- stats section -->
        <section class="stats-section">
          <div class="stat-box">
            <i class="bi bi-list-task"></i>

            <span>
              Pending Tasks:
              <strong id="pendingCount">0</strong>
            </span>
          </div>

          <div class="divider"></div>

          <div class="stat-box">
            <i class="bi bi-check-circle"></i>

            <span class="tasks">
              Completed Tasks:
              <strong id="completedCount">0</strong>
            </span>
          </div>
        </section>

        <!-- tasks section -->
        <section class="tasks-section">
          <!-- pending tasks -->
          <section class="pending-tasks">
            <div class="section-title">
              <i class="bi bi-circle"></i>
              <h2>pending tasks</h2>
            </div>

            <div class="divider1"></div>

            <div class="pending-task-list">
              <div class="task-card">
                <div class="task-info">
                  <input type="checkbox" />

                  <div>
                    <h3>Complete internship project</h3>
                    <p>18 May 2026, 08:30 PM</p>
                  </div>
                </div>

                <div class="task-actions">
                  <button class="edit-btn">Edit</button>
                  <button class="delete-btn">Delete</button>
                </div>
              </div>
            </div>
          </section>

          <!-- completed tasks -->
          <section class="completed-container">
            <div class="section-title">
              <i class="bi bi-check-circle"></i>
              <h2>completed tasks</h2>
            </div>

            <div class="divider2"></div>

            <div class="completed-task-list">
              <div class="task-card">
                <div class="task-info">
                  <input type="checkbox" />

                  <div>
                    <h3>Buy Groceries</h3>
                    <p>18 May 2026, 08:30 PM</p>
                  </div>
                </div>

                <div class="task-actions">
                  <button class="edit-btn">Edit</button>
                  <button class="delete-btn">Delete</button>
                </div>
              </div>
            </div>
          </section>
        </section>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
