<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>To-Do Webapp</title>
  </head>
  <body>
    <main>
      <div class="app-container">
        <header>
          <h1 class="project-title">To-Do List</h1>
          <h3 class="subtitle">organize Your Tasks</h3>
          <p class="date-time-container">
            <i class="bi bi-calendar-date"></i>
            <span class="date-time"></span>
          </p>
        </header>

        <!-- add- task section -->
        <section class="add-task-section"></section>

        <!-- stats section -->
        <section class="stats-section"></section>

        <!-- tasks section -->
        <section class="tasks-section">
          <!-- pending tasks -->
          <section class="pending-tasks">
            <h2 class="pending-heading">pending tasks</h2>
            <div class="pending-task-list"></div>
          </section>

          <!-- completed tasks -->
          <section class="completed-container">
            <h2 class="completed-heading">completed tasks</h2>
            <div class="completed-task-list"></div>
          </section>
        </section>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
